<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PDF para Markdown{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #171a23;
      --panel-border: #262b38;
      --text: #e8eaf0;
      --muted: #8b90a3;
      --accent: #6c8cff;
      --accent-dark: #4d6bdb;
      --success: #3ecf8e;
      --error: #ff6b6b;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1b2030 0%, #0f1117 55%);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }
    h1 {
      font-size: 1.5rem;
      margin: 0 0 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    p.subtitle {
      color: var(--muted);
      margin: 0 0 28px;
      font-size: 0.95rem;
    }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 20px;
    }
    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  <div class="card">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
